<!DOCTYPE html>
<html lang="bg">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>MARLEX — LIMITLESS DROP</title>
  <link rel="stylesheet" href="styles.css"/>
</head>
<body>

<header>
  <h1>MARLEX</h1>
  <button onclick="scrollToProduct()">GET LIMITLESS</button>
</header>

<section class="hero">
  <h2>DROP 01 — LIMITLESS</h2>
  <p>No limits. No excuses.</p>
</section>

<section id="product" class="product">
  <div class="gallery">
    <img id="mainImage" src="images/tee-front.png" />
    <div class="thumbs">
      <img src="images/tee-front.png" onclick="changeImage(this.src)" />
      <img src="images/tee-back.png" onclick="changeImage(this.src)" />
    </div>
  </div>

  <div class="info">
    <h2>MARLEX LIMITLESS TEE</h2>
    <p class="price">15€</p>

    <p>
      Минимал дизайн. Максимално послание.  
      LIMITLESS тениска за хора без граници.
    </p>

    <label>Размер:</label>
    <select id="size">
      <option>S</option>
      <option>M</option>
      <option>L</option>
      <option>XL</option>
    </select>

    <button onclick="addToCart()">Добави в количка</button>
  </div>
</section>

<section class="cart">
  <h2>Количка</h2>
  <ul id="cartItems"></ul>
  <p id="total">Общо: 0€</p>

  <input id="name" placeholder="Име"/>
  <input id="phone" placeholder="Телефон"/>
  <input id="address" placeholder="Адрес"/>

  <button onclick="submitOrder()">Поръчай</button>
</section>

<script src="script.js"></script>
</body>
</html>
